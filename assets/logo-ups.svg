<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 122" role="img" aria-label="UPS">
  <defs>
    <linearGradient id="upsGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe389"/>
      <stop offset=".5" stop-color="#ffd100"/>
      <stop offset="1" stop-color="#d6a000"/>
    </linearGradient>
    <linearGradient id="upsBrown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c3614"/>
      <stop offset="1" stop-color="#2a1405"/>
    </linearGradient>
  </defs>
  <!-- Gold outer shield -->
  <path d="M6 6 H94 V66 Q92 102 50 118 Q8 102 6 66 Z" fill="url(#upsGold)"/>
  <!-- Brown inner shield -->
